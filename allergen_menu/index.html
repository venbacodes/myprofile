    <style>
      body {
        padding: 20px;

      }

      .guide-txt {

       padding: 20px;

       border-radius: 10px;       
       font-size:18px;
       font-family: Geograph, sans-serif;
       border-style: solid;      
       border-width: thin;
       border-color: lightgray;
       
      }

      .ingredient-list {
        margin-top: 10px;
        font-style: italic;
      }

      .container, .container-md, .container-sm {
    max-width: 99%;}
      
      .icon-margin {
        margin-left: 10px;
        vertical-align: text-bottom;
      }

      #searchContainer {
        display: none;
      }

      .category-list {
        border-style: solid;
        border-width: thin;
        border-color: #cdc19b;
        background-color: #f5f1e9;   
     
      }

      .list-group{
        margin-top:10px;
      }

      .list-group-item-cat {
        position: relative;
    display: block;
    padding: 0.5rem 1rem;
    color: #212529;
    text-decoration: none;
    background-color: #fff;
    border: 1px solid rgba(0,0,0,.125);
      }

      .list-group-item {
    cursor: pointer;
    display: inline-block;
    width: calc(50% - 10px); /* Takes 50% width minus some margin */
    margin: 5px;
    box-sizing: border-box;
    border-radius: 5px;
}


.food-item {
    padding: 10px;
    background-color: #f5f1e9;
    border: 1px solid #cdc19b;
    border-radius: 5px;
    text-align: center;
    position: relative; 
}

.food-item img.icon {
    position: absolute;
    bottom: 10px;
    left: 10px;
    height: 25px;
    width: 25px;
}
.list-group-item-cat.active {
        background-color: #84776e;
        color: white;
      }

      .list-group-item.active {
        background-color: #84776e;
        color: white;
      }

      .btn-primary {
        background-color: #b2282e;
        border-color: #b2282e;
        border-radius: 5px!important;
        border-color: white;
      }

          
      .btn-secondary {
        background-color: #293e51;
        border-color: #293e51;
        border-radius: 5px!important;
        border-color: white;        
      }

      .list-group-item-cat.search-option {
        background-color: #293e51;
        color: white;
        
      }

      .list-group-item-cat.search-option:hover {
        background-color: #8a1f24;
      }

      .list-group-item-cat.search-option:active {
        background-color: #b2282e;
      }

      .list-group-item:hover {
        background-color: #ddd;
      }

      .list-group-item.text-danger {
        color: #b2282e;
      }

      .red {
        color: #b2282e;      
      }

      .col-md-3 {
         flex: 0 0 auto;
        width: 20%;
        }
        .col-md-9 {
    flex: 0 0 auto;
    width: 80%;
}

.btn-reset {
    padding:10px 15px;
    background-color: gray;
    color:white; 
}



.disable-doubletap-to-zoom {
    touch-action: none;
}

      // DOM Elements
      const categoryList = document.getElementById('categoryList');
      const ingredientFilters = document.getElementById('ingredientFilters');
      const foodList = document.getElementById('foodList');
      const searchResults = document.getElementById('searchResults');
      const searchOption = document.querySelector('.search-option');
      const searchContainer = document.getElementById('searchContainer');
      const searchInput = document.getElementById('searchInput');
      const searchButton = document.getElementById('searchButton');
      const clearFilters = document.getElementById('clearFilter');


    

      // State
      let selectedCategory = null;
      const selectedIngredients = new Set();

      // Render Functions
      const renderCategories = () => {
        categoryList.innerHTML = '';

        // Create and insert the search option as the first item in the category list
        const searchOptionElement = document.createElement('li');
        searchOptionElement.className = 'list-group-item-cat search-option';
        searchOptionElement.textContent = 'Search';
        searchOptionElement.addEventListener('click', showSearchBox);
        categoryList.appendChild(searchOptionElement);

        categories.forEach((category) => {
          const li = document.createElement('li');
          li.className = `list-group-item-cat ${selectedCategory === category.id ? 'active' : ''}`;
          li.textContent = category.name;
          li.addEventListener('click', () => toggleCategory(category.id));
          categoryList.appendChild(li);
        });
      };

      const renderIngredientFilters = () => {
        ingredientFilters.innerHTML = '';
       
      ingredientFilters.appendChild(clearFilters);
        clearFilters.addEventListener('click', resetFilters);

        const uniqueIngredients = new Set();
        categories.forEach((category) => {
          category.items.forEach((item) => {
            item.ingredients.forEach((ingredient) => uniqueIngredients.add(ingredient));
          });
        });



        uniqueIngredients.forEach((ingredient) => {
          const button = document.createElement('button');
          button.className = `btn ${selectedIngredients.has(ingredient) ? 'btn-primary' : 'btn-secondary'}`;
          button.textContent = ingredient;
          button.addEventListener('click', () => toggleIngredientFilter(ingredient));
          ingredientFilters.appendChild(button);
        });

      
      };

      const renderFoodList = () => {
    searchResults.style.display = 'none';
    foodList.style.display = 'block';

    const filteredCategories = selectedCategory ? categories.filter((category) => category.id === selectedCategory) : categories;

    foodList.innerHTML = '';

    filteredCategories.forEach((category) => {
        let containsAllergenItems = [];
        let noAllergenItems = [];
        
        category.items.forEach((item) => {
            if (containsSelectedAllergens(item)) {
                containsAllergenItems.push(item);
            } else {
                noAllergenItems.push(item);
            }
        });

        // Combine the two arrays: first items without allergens, then items with allergens
        const orderedItems = [...noAllergenItems, ...containsAllergenItems];

        orderedItems.forEach((item) => {
            const listItem = document.createElement('div');
            listItem.className = 'list-group-item';

            const itemName = document.createElement('strong');
            itemName.textContent = item.name;
            listItem.appendChild(itemName);

            const containsAllergens = containsSelectedAllergens(item);

            if (containsAllergens) {
                const icon = document.createElement('img');
                icon.src = 'images/NOTOK.png';
                icon.alt = 'Not OK';
                icon.classList.add('icon', 'icon-margin');
                listItem.appendChild(icon);
            } else {
                const icon = document.createElement('img');
                icon.src = 'images/OK.png';
                icon.alt = 'OK';
                icon.classList.add('icon', 'icon-margin');
                listItem.appendChild(icon);
            }

            listItem.addEventListener('click', () => toggleItem(category.id, item.id));

            const ingredientList = document.createElement('div');
            ingredientList.className = 'ingredient-list';

            const containsText = document.createElement('span');
            containsText.textContent = 'Contains: ';
            ingredientList.appendChild(containsText);

            const ingredientText = document.createElement('span');
            ingredientText.textContent = item.ingredients.join(', ');
            ingredientList.appendChild(ingredientText);

            listItem.appendChild(ingredientList);

            if (selectedIngredients.size > 0 && containsAllergens) {
                listItem.classList.add('text-danger');
            }

            foodList.appendChild(listItem);
        });
    });
};

      const toggleCategory = (categoryId) => {
        guide.style.display = 'none';
        window.scrollTo(0, 0);
        selectedCategory = selectedCategory === categoryId ? null : categoryId;
        renderCategories();
        renderFoodList();
        searchInput.value = '';
      };

      const toggleIngredientFilter = (ingredient) => {
        guide.style.display = 'none';
  if (selectedIngredients.has(ingredient)) {
    selectedIngredients.delete(ingredient);
  } else {
    selectedIngredients.add(ingredient);
  }
  renderIngredientFilters();
  if (searchResults.style.display === 'block') {
    renderSearchResults(searchItems(searchInput.value.trim()));
  } else {
    renderFoodList();
  }

  window.scrollTo(0, 0);

};

      const toggleItem = (categoryId, itemId) => {
        const category = categories.find((category) => category.id === categoryId);
        const item = category.items.find((item) => item.id === itemId);
        item.expanded = !item.expanded;
        renderFoodList();
      };

      const containsSelectedAllergens = (item) => {
        for (const allergen of selectedIngredients) {
          if (item.ingredients.includes(allergen)) {
            return true;
          }
        }
        return false;
      };

      // Search Functionality
      searchOption.addEventListener('click', showSearchBox);
      searchButton.addEventListener('click', performSearch);

      function performSearch() {
  const searchTerm = searchInput.value.trim();
  if (!searchTerm) {
    return;
  }

  const searchMatches = searchItems(searchTerm);

  renderSearchResults(searchMatches);
}

      function searchItems(searchTerm) {
        const matches = [];

        categories.forEach((category) => {
          category.items.forEach((item) => {
            if (item.name.toLowerCase().includes(searchTerm.toLowerCase())) {
              matches.push(item);
            }
          });
        });

        return matches;
      }

      function renderSearchResults(searchMatches) {
        searchResults.innerHTML = '';

        searchMatches.forEach((item) => {
          const listItem = document.createElement('div');
          listItem.className = 'list-group-item';

          const itemName = document.createElement('strong');
          itemName.textContent = item.name;

          const containsAllergens = containsSelectedAllergens(item);

          if (containsAllergens) {
            const icon = document.createElement('img');
            icon.src = 'images/NotOK.png';
            icon.alt = 'Not OK';
            icon.classList.add('icon','icon-margin');
            itemName.appendChild(icon);
          }

          else {
            const icon = document.createElement('img');
            icon.src = 'images/OK.png';
            icon.alt = 'OK';
            icon.classList.add('icon','icon-margin');
            itemName.appendChild(icon);
          }

          listItem.appendChild(itemName);

          const ingredientList = document.createElement('div');
          ingredientList.className = 'ingredient-list';

          const containsText = document.createElement('span');
          containsText.textContent = 'Contains: ';
          ingredientList.appendChild(containsText);

          const ingredientText = document.createElement('span');
          ingredientText.textContent = item.ingredients.join(', ');
          ingredientList.appendChild(ingredientText);

          listItem.appendChild(ingredientList);

          if (selectedIngredients.size > 0 && containsAllergens) {
            listItem.classList.add('text-danger');
          }

          searchResults.appendChild(listItem);
        });

        searchResults.style.display = 'block';
        foodList.style.display = 'none';
        
      }

      function resetFilters() {
        selectedIngredients.clear();
        renderIngredientFilters();
        renderFoodList();
}

      function showSearchBox() {
        guide.style.display = 'none';
        foodList.innerHTML = '';
  selectedCategory = null;
  renderCategories();

  searchContainer.style.display = 'block';
  searchInput.value = '';
  searchInput.focus();
}

      function hideSearchResults() {
        searchResults.innerHTML = '';
        searchResults.style.display = 'none';
        foodList.style.display = 'block';
       
      }

      // Initial Rendering
      renderCategories();
      renderIngredientFilters();
